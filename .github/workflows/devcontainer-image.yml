# Builds and publishes the prebuilt devcontainer image
# (ghcr.io/momsdish-corp/devcontainer-public) from .devcontainer/base-image/.
#
# - Nightly: compares upstream versions (base image digest, node feature
#   digest, node LTS, and tool versions from GitHub releases, crates.io, and
#   Anthropic's release feed) against the versions.json asset of the newest
#   GitHub release; rebuilds and releases only when something changed.
# - Push to main touching the image definition: always rebuilds.
# - Manual dispatch: force=true rebuilds unconditionally; force=false just
#   runs the up-to-date check (and rebuilds if needed).
name: devcontainer-image

on:
  schedule:
    - cron: "17 3 * * *" # nightly, 03:17 UTC
  push:
    branches: [main]
    paths:
      - ".devcontainer/base-image/**"
      - ".github/workflows/devcontainer-image.yml"
      - ".github/scripts/devcontainer-image-versions.sh"
      - ".github/scripts/devcontainer-image-smoke.sh"
  workflow_dispatch:
    inputs:
      force:
        description: Build and release even if nothing upstream changed
        type: boolean
        default: false

permissions:
  contents: write # create the release + tag
  packages: write # push the image to GHCR

concurrency:
  group: devcontainer-image
  cancel-in-progress: false

# Explicit bash so run steps get `-o pipefail` (the default shell omits it,
# which once let a failed versions script hide behind a successful `tee`)
defaults:
  run:
    shell: bash

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decide.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute upstream version manifest
        run: |
          .github/scripts/devcontainer-image-versions.sh | tee versions.json
          jq -e .tools versions.json > /dev/null

      - name: Fetch manifest of newest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo "${GITHUB_REPOSITORY}" \
            --pattern versions.json --output previous.json \
            || echo "No previous release manifest found."

      - name: Decide whether a rebuild is needed
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE: ${{ inputs.force }}
        run: |
          reason=""
          if [[ "${EVENT_NAME}" == "push" ]]; then
            reason="image definition changed"
          elif [[ "${FORCE}" == "true" ]]; then
            reason="forced via workflow_dispatch"
          elif [[ ! -f previous.json ]]; then
            reason="no previous release"
          elif ! diff <(jq -S . previous.json) <(jq -S . versions.json); then
            reason="upstream versions changed"
          fi
          if [[ -n "${reason}" ]]; then
            echo "Rebuild needed: ${reason}"
            echo "needs_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Image is up to date; nothing to do."
            echo "needs_build=false" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: versions
          path: versions.json

  build-release:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: versions

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pick release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base="v$(date -u +%Y.%m.%d)"
          tag="${base}"
          n=1
          while gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; do
            n=$((n + 1))
            tag="${base}.${n}"
          done
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Release tag: ${tag}"

      # With `platform` set, devcontainers/ci does not push: it exports the
      # multi-arch build to an OCI archive at /tmp/output.tar, to be pushed
      # with skopeo (preinstalled on the runner, reuses docker login creds).
      - name: Build image
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/base-image/devcontainer.json
          imageName: ${{ env.IMAGE }}
          imageTag: ${{ steps.tag.outputs.tag }}
          platform: linux/amd64,linux/arm64
          push: never
          noCache: true

      - name: Push image to GHCR
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ls -la /tmp/output.tar
          skopeo copy --all oci-archive:/tmp/output.tar "docker://${IMAGE}:${TAG}"

      - name: Smoke test (amd64)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker run --rm --platform linux/amd64 \
            -v "${PWD}/.github/scripts:/smoke:ro" \
            "${IMAGE}:${TAG}" bash /smoke/devcontainer-image-smoke.sh full

      - name: Smoke test (arm64, emulated)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${PWD}/.github/scripts:/smoke:ro" \
            "${IMAGE}:${TAG}" bash /smoke/devcontainer-image-smoke.sh binaries

      # Only a smoke-tested image gets the tag the devcontainers actually pull
      - name: Promote to latest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: docker buildx imagetools create --tag "${IMAGE}:latest" "${IMAGE}:${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          {
            echo "Prebuilt devcontainer image:"
            echo
            echo '```'
            echo "${IMAGE}:${TAG}"
            echo '```'
            echo
            echo "Also tagged \`latest\`. Platforms: linux/amd64, linux/arm64."
            echo
            echo "| Component | Version |"
            echo "| --- | --- |"
            jq -r '
              [["base image", .base_image],
               ["node feature", .features["ghcr.io/devcontainers/features/node:1"]],
               ["node (LTS)", .node_lts]]
              + (.tools | to_entries | map([.key, .value]))
              | .[] | "| \(.[0]) | \(.[1]) |"
            ' versions.json
            echo
            echo "tmux and ripgrep come from Debian trixie and refresh on every rebuild."
          } > notes.md
          gh release create "${TAG}" versions.json \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Devcontainer image ${TAG}" \
            --notes-file notes.md
